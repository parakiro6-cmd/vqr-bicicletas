<!DOCTYPE html>
<html lang="es" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#3b82f6" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="VQR Bicis" />
  <meta name="description" content="Sistema de control de entradas y salidas de bicicletas" />
  <title>VQR – Control de Bicicletas</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./logo.png" />

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' }
          },
          animation: {
            'fade-in': 'fadeIn .25s ease-out',
            'slide-up': 'slideUp .3s ease-out',
            'pulse-ring': 'pulseRing 1.5s cubic-bezier(0.215,0.61,0.355,1) infinite'
          },
          keyframes: {
            fadeIn:    { from: { opacity: 0 },                   to: { opacity: 1 } },
            slideUp:   { from: { opacity: 0, transform: 'translateY(20px)' }, to: { opacity: 1, transform: 'translateY(0)' } },
            pulseRing: { '0%,100%': { opacity: 1 }, '50%': { opacity: .4 } }
          }
        }
      }
    };
  </script>

  <style>
    /* ── Barra de scroll personalizada ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }

    /* ── Esquinas animadas del escáner QR ── */
    .qr-corner { position: absolute; width: 28px; height: 28px; border-color: #3b82f6; border-style: solid; }
    .qr-corner-tl { top: 0; left: 0;  border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
    .qr-corner-tr { top: 0; right: 0; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
    .qr-corner-bl { bottom: 0; left: 0;  border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
    .qr-corner-br { bottom: 0; right: 0; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }

    /* ── Línea de escaneo animada ── */
    @keyframes scan {
      0%   { top: 10%; }
      50%  { top: 85%; }
      100% { top: 10%; }
    }
    .scan-line {
      position: absolute; left: 8%; right: 8%; height: 2px;
      background: linear-gradient(90deg, transparent, #3b82f6, transparent);
      animation: scan 2s ease-in-out infinite;
      border-radius: 1px;
    }

    /* ── Toast notifications ── */
    #toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999; display: flex; flex-direction: column; gap: .5rem; }

    /* ── Input focus ring personalizado ── */
    input:focus, select:focus, textarea:focus { outline: none; box-shadow: 0 0 0 2px #3b82f6; }

    /* ── Transición de vistas ── */
    .view-enter { animation: fadeIn .25s ease-out; }

    /* ── Tabla responsiva ── */
    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

    /* ── Badge de tipo ── */
    .badge-entrada { background-color: #166534; color: #86efac; }
    .badge-salida  { background-color: #7f1d1d; color: #fca5a5; }

    /* ── Modo claro: variables de color ── */
    html.light body                 { background-color: #f1f5f9; color: #0f172a; }
    html.light .bg-slate-900        { background-color: #f8fafc !important; }
    html.light .bg-slate-800        { background-color: #ffffff !important; }
    html.light .bg-slate-700        { background-color: #e2e8f0 !important; }
    html.light .border-slate-700    { border-color: #cbd5e1 !important; }
    html.light .border-slate-600    { border-color: #94a3b8 !important; }
    html.light .text-white          { color: #0f172a !important; }
    html.light .text-slate-100      { color: #1e293b !important; }
    html.light .text-slate-300      { color: #334155 !important; }
    html.light .text-slate-400      { color: #475569 !important; }
    html.light .text-slate-500      { color: #64748b !important; }
    html.light .text-slate-600      { color: #94a3b8 !important; }
    html.light input, html.light select { background-color: #f1f5f9 !important; color: #0f172a !important; border-color: #94a3b8 !important; }
    html.light .bg-slate-900\/40    { background-color: rgba(241,245,249,.8) !important; }
    html.light .bg-slate-700\/30    { background-color: rgba(226,232,240,.5) !important; }
    html.light .bg-slate-700\/20    { background-color: rgba(226,232,240,.3) !important; }
    html.light #theme-toggle        { background-color: #e2e8f0; border-color: #94a3b8; }

    /* ── Spinner ── */
    .spinner {
      width: 20px; height: 20px; border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin .7s linear infinite; display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans antialiased">

  <!-- ══════════════════════════════════════
       CONTENEDOR PRINCIPAL DE LA APP
  ══════════════════════════════════════ -->
  <div id="app" class="min-h-screen"></div>

  <!-- ══════════════════════════════════════
       CONTENEDOR DE TOASTS
  ══════════════════════════════════════ -->
  <div id="toast-container"></div>

  <!-- ══════════════════════════════════════
       BOTÓN CAMBIO DE TEMA (fijo, esquina)
  ══════════════════════════════════════ -->
  <button id="theme-toggle" onclick="toggleTheme()"
          title="Cambiar tema"
          class="fixed bottom-5 right-5 z-50 w-10 h-10 rounded-full shadow-lg
                 bg-slate-700 hover:bg-slate-600 dark:bg-slate-700 dark:hover:bg-slate-600
                 border border-slate-600 flex items-center justify-center
                 transition-all active:scale-90">
    <!-- Ícono sol (modo claro activo) -->
    <svg id="icon-sun" class="hidden w-5 h-5 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"/>
    </svg>
    <!-- Ícono luna (modo oscuro activo) -->
    <svg id="icon-moon" class="w-5 h-5 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
    </svg>
  </button>

  <!-- ══════════════════════════════════════
       INDICADOR DE SINCRONIZACIÓN OFFLINE
  ══════════════════════════════════════ -->
  <div id="sync-badge"
       class="hidden fixed top-4 left-1/2 -translate-x-1/2 z-50
              bg-amber-500 text-slate-900 text-xs font-semibold
              px-4 py-2 rounded-full shadow-lg flex items-center gap-2">
    <svg class="w-3 h-3 animate-spin" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
    </svg>
    <span id="sync-badge-text">Sincronizando...</span>
  </div>

  <!-- ══════════════════════════════════════
       MODAL GENÉRICO (registro de bicicleta)
  ══════════════════════════════════════ -->
  <div id="modal-overlay"
       class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm z-40 flex items-center justify-center p-4"
       onclick="closeModalOnOverlay(event)">
    <div id="modal-content"
         class="bg-slate-800 rounded-2xl shadow-2xl w-full max-w-md animate-slide-up
                border border-slate-700 max-h-[90vh] overflow-y-auto">
    </div>
  </div>

  <!-- ══════════════════════════════════════
       DEPENDENCIAS EXTERNAS
  ══════════════════════════════════════ -->
  <!-- Supabase JS SDK v2 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <!-- html5-qrcode para escaneo QR -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

  <!-- App principal -->
  <script src="./app.js"></script>
</body>
</html>
